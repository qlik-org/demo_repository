properties:
  name: Knowledge mart
  id: knowledge_mart-ksno
  type: KNOWLEDGE_MART
settings:
  artifactsLocation:
    internalSchema: '{{task.knowledge_mart-ksno.internalSchema}}'
    taskSchema: '{{task.knowledge_mart-ksno.taskSchema}}'
    databaseName: '{{task.knowledge_mart-ksno.databaseName}}'
  taskRuntime:
    maxNumberOfRecords: '{{task.knowledge_mart-ksno.maxNumberOfRecords}}'
    warehouseSelection:
      warehouseName: '{{task.knowledge_mart-ksno.warehouseName}}'
  indexArtifactsLocation:
    databricksVectorSearchEndpoint: '{{task.knowledge_mart-ksno.databricksVectorSearchEndpoint}}'
    schema: '{{task.knowledge_mart-ksno.indexSchema}}'
    name: '{{task.knowledge_mart-ksno.indexName}}'
    database: '{{task.knowledge_mart-ksno.indexDatabase}}'
  llmSettings:
    kindId: llm:snowflake
    parameters:
      embedding_model: nv-embed-qa-4
      completion_model: mistral-7b
