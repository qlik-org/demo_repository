properties:
  name: Lake_landing_1
  id: lake_landing_1-r-vv
  type: LAKE_LANDING
settings:
  fullLoadOnly: true
  targetEndpoint:
    targetConnection: '{{task.lake_landing_1-r-vv.targetConnection}}'
  changeDataPartitioning:
    mode: PARTITION_EVERY
    partitionEvery: 1440
    partitionBaseTime: 1970-01-01T00:00:00.0000000Z
  fileAttributes:
    general:
      addMetadataHeader:
        withColumnName: false
        withDataTypes: false
    metadataFiles:
      createInTargetFolder: false
  changeProcessingTuning:
    transactionTuning:
      offloadTransactions:
        deleteAndInsertOnPkUpdate: false
  metadata:
    controlTableSelection:
      - tableId: CHANGE_DATA_PARTITIONS
        targetName: attrep_cdc_partitions
        isChecked: true
  storeChangesOptions:
    changeTableHeaderColumn:
      - id: PARTITION_NAME
        headerColumn: partition_name
        isChecked: true
